[execution]
# single_cycle = current baseline behavior
# scan_sequence = multi-cycle execution using repeated input frames
mode = "single_cycle"

# Used when mode = "scan_sequence"
cycles = 4
warmup_cycles = 0
max_cycles = 64

# Reset PLC instance at start of each testcase
per_testcase_reset = true

# Executor timeout per testcase
timeout_ms = 5000
